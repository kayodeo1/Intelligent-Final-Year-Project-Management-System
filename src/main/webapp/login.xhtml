<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FPMS — Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background-color: #0A1628;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }

        /* Logo / branding */
        .login-brand {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .login-brand-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #1B3A6B;
            border: 2px solid #C9A84C;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.75rem;
        }
        .login-brand-icon span {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: #C9A84C;
            letter-spacing: 1px;
        }
        .login-brand h1 {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: #C9A84C;
            letter-spacing: 0.5px;
        }
        .login-brand p {
            font-size: 0.82rem;
            color: #9AA3B2;
            margin-top: 0.25rem;
        }

        /* Card */
        .login-card {
            background: #FFFFFF;
            border-radius: 8px;
            border-top: 4px solid #C9A84C;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            padding: 2rem 1.75rem 1.75rem;
        }
        .login-card h2 {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #1B3A6B;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #4A5568;
            margin-bottom: 0.35rem;
        }
        .form-input {
            width: 100%;
            padding: 0.65rem 0.85rem;
            border: 1.5px solid #E5E9F0;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #1A202C;
            background: #FFFFFF;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .form-input:focus {
            outline: none;
            border-color: #1B3A6B;
            box-shadow: 0 0 0 3px rgba(27,58,107,0.1);
        }

        /* Role select */
        .role-group {
            margin-bottom: 1.25rem;
        }
        .role-options {
            display: flex;
            gap: 0.75rem;
        }
        .role-option {
            flex: 1;
            position: relative;
        }
        .role-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }
        .role-option label {
            display: block;
            text-align: center;
            padding: 0.6rem 0;
            border: 1.5px solid #E5E9F0;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #4A5568;
            cursor: pointer;
            transition: all 0.2s;
        }
        .role-option input[type="radio"]:checked + label {
            border-color: #1B3A6B;
            background: #D6E4F7;
            color: #1B3A6B;
            font-weight: 600;
        }

        /* Submit button */
        .btn-login {
            width: 100%;
            padding: 0.7rem;
            background-color: #C9A84C;
            color: #0A1628;
            border: none;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .btn-login:hover {
            background-color: #F0D080;
        }

        .login-footer {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.8rem;
            color: #9AA3B2;
        }

        /* Error message */
        .login-error {
            background: #FDECEA;
            color: #C0392B;
            font-size: 0.82rem;
            padding: 0.55rem 0.85rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }
    </style>
</h:head>

<h:body>

    <div class="login-wrapper">

        <!-- Branding -->
        <div class="login-brand">
            <div class="login-brand-icon"><span>FP</span></div>
            <h1>FPMS</h1>
            <p>Final Year Project Management System</p>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <h2>Sign In</h2>

            <h:form id="loginForm" prependId="false">
                <p:messages id="loginMsg" globalOnly="true"
                            style="background:#FDECEA; color:#C0392B; font-size:0.82rem;
                                   padding:0.55rem 0.85rem; border-radius:4px; margin-bottom:1rem;
                                   text-align:center; list-style:none;" />

                <!-- Role -->
                <div class="role-group">
                    <label class="form-label">I am a</label>
                    <div class="role-options">
                        <div class="role-option">
                            <input type="radio" id="roleStudent" name="role" value="student" checked="checked" />
                            <label for="roleStudent">&#127891; Student</label>
                        </div>
                        <div class="role-option">
                            <input type="radio" id="roleSupervisor" name="role" value="supervisor" />
                            <label for="roleSupervisor">&#128218; Supervisor</label>
                        </div>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input"
                           placeholder="you@university.edu" required="required" />
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input"
                           placeholder="Enter your password" required="required" />
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-login">Sign In</button>
            </h:form>

            <div class="login-footer">
                &#169; 2026 FPMS — University Portal
            </div>
        </div>

    </div>

</h:body>
</html>
