<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">

    <!-- Title -->
    <div style="margin-bottom: 1.5rem;">
        <label for="title"
               style="display: block; font-size: 0.875rem; font-weight: 600;
                      color: #4A5568; margin-bottom: 0.4rem;">
            Project Title <span style="color: #C0392B;">*</span>
        </label>
        <p:inputText id="title"
                     value="#{proposalBean.entry.title}"
                     required="true"
                     requiredMessage="Project title is required"
                     placeholder="e.g. Intelligent Project Management System with NLP-based Similarity Detection"
                     style="width: 100%; padding: 0.65rem 0.9rem; border: 1.5px solid #E5E9F0;
                            border-radius: 4px; font-size: 0.9rem; color: #1A202C;
                            background: #FFFFFF; transition: border-color 0.2s;
                            box-sizing: border-box;" />
        <p:message id="m_title" for="title"
                   style="font-size: 0.8rem; color: #C0392B; margin-top: 0.25rem;" />
    </div>

    <!-- Problem Statement -->
    <div style="margin-bottom: 1.5rem;">
        <label for="problemStatement"
               style="display: block; font-size: 0.875rem; font-weight: 600;
                      color: #4A5568; margin-bottom: 0.4rem;">
            Problem Statement <span style="color: #C0392B;">*</span>
        </label>
        <p:inputTextarea id="problemStatement"
                         value="#{proposalBean.entry.problemStatement}"
                         required="true"
                         requiredMessage="Problem statement is required"
                         rows="5"
                         placeholder="Describe the problem your project addresses..."
                         style="width: 100%; padding: 0.65rem 0.9rem; border: 1.5px solid #E5E9F0;
                                border-radius: 4px; font-size: 0.9rem; color: #1A202C;
                                background: #FFFFFF; transition: border-color 0.2s;
                                box-sizing: border-box; resize: vertical; min-height: 120px;
                                font-family: 'Inter', 'Segoe UI', Arial, sans-serif;" />
        <p:message id="m_problemStatement" for="problemStatement"
                   style="font-size: 0.8rem; color: #C0392B; margin-top: 0.25rem;" />
    </div>

    <!-- Aim and Objectives (3 single-line inputs) -->
    <div style="margin-bottom: 1.5rem;">
        <label style="display: block; font-size: 0.875rem; font-weight: 600;
                      color: #4A5568; margin-bottom: 0.6rem;">
            Aim &amp; Objectives <span style="color: #C0392B;">*</span>
        </label>

        <div style="display: flex; flex-direction: column; gap: 0.75rem;">
            <!-- Objective 1 -->
            <div style="display: flex; align-items: center; gap: 0.65rem;">
                <span style="width: 24px; height: 24px; border-radius: 50%;
                             background: #D6E4F7; color: #1B3A6B; display: flex;
                             align-items: center; justify-content: center;
                             font-size: 0.72rem; font-weight: 700; flex-shrink: 0;">1</span>
                <p:inputText id="objective1"
                             value="#{proposalBean.entry.objectives}"
                             required="true"
                             requiredMessage="Objective 1 is required"
                             placeholder="First objective — e.g. To develop a web-based project management system"
                             style="flex: 1; padding: 0.6rem 0.9rem; border: 1.5px solid #E5E9F0;
                                    border-radius: 4px; font-size: 0.9rem; color: #1A202C;
                                    background: #FFFFFF; transition: border-color 0.2s;
                                    box-sizing: border-box;" />
            </div>
            <p:message id="m_obj1" for="objective1"
                       style="font-size: 0.8rem; color: #C0392B; margin-left: 2.3rem;" />

            <!-- Objective 2 -->
            <div style="display: flex; align-items: center; gap: 0.65rem;">
                <span style="width: 24px; height: 24px; border-radius: 50%;
                             background: #D6E4F7; color: #1B3A6B; display: flex;
                             align-items: center; justify-content: center;
                             font-size: 0.72rem; font-weight: 700; flex-shrink: 0;">2</span>
                <input type="text" id="objective2" name="objective2"
                       placeholder="Second objective — e.g. To implement NLP-based similarity detection"
                       style="flex: 1; padding: 0.6rem 0.9rem; border: 1.5px solid #E5E9F0;
                              border-radius: 4px; font-size: 0.9rem; color: #1A202C;
                              background: #FFFFFF; transition: border-color 0.2s;
                              box-sizing: border-box;" />
            </div>

            <!-- Objective 3 -->
            <div style="display: flex; align-items: center; gap: 0.65rem;">
                <span style="width: 24px; height: 24px; border-radius: 50%;
                             background: #D6E4F7; color: #1B3A6B; display: flex;
                             align-items: center; justify-content: center;
                             font-size: 0.72rem; font-weight: 700; flex-shrink: 0;">3</span>
                <input type="text" id="objective3" name="objective3"
                       placeholder="Third objective — e.g. To evaluate system effectiveness through testing"
                       style="flex: 1; padding: 0.6rem 0.9rem; border: 1.5px solid #E5E9F0;
                              border-radius: 4px; font-size: 0.9rem; color: #1A202C;
                              background: #FFFFFF; transition: border-color 0.2s;
                              box-sizing: border-box;" />
            </div>
        </div>
    </div>

    <!-- Methodology -->
    <div style="margin-bottom: 2rem;">
        <label for="methodology"
               style="display: block; font-size: 0.875rem; font-weight: 600;
                      color: #4A5568; margin-bottom: 0.4rem;">
            Methodology <span style="color: #C0392B;">*</span>
        </label>
        <p:inputTextarea id="methodology"
                         value="#{proposalBean.entry.methodology}"
                         required="true"
                         requiredMessage="Methodology is required"
                         rows="5"
                         placeholder="Describe how you intend to carry out the project..."
                         style="width: 100%; padding: 0.65rem 0.9rem; border: 1.5px solid #E5E9F0;
                                border-radius: 4px; font-size: 0.9rem; color: #1A202C;
                                background: #FFFFFF; transition: border-color 0.2s;
                                box-sizing: border-box; resize: vertical; min-height: 120px;
                                font-family: 'Inter', 'Segoe UI', Arial, sans-serif;" />
        <p:message id="m_methodology" for="methodology"
                   style="font-size: 0.8rem; color: #C0392B; margin-top: 0.25rem;" />
    </div>

    <!-- Action Buttons -->
    <div style="display: flex; align-items: center; gap: 0.85rem; padding-top: 0.75rem;
                border-top: 1px solid #E5E9F0;">

        <p:commandButton rendered="#{proposalBean.entry.id == null}"
                         id="submitBtn"
                         value="Submit Proposal"
                         actionListener="#{proposalBean.createProposal}"
                         process="proposalView"
                         update="proposalView,global_msg"
                         style="background-color: #C9A84C; color: #0A1628; border: none;
                                padding: 0.65rem 1.6rem; border-radius: 4px;
                                font-size: 0.9rem; font-weight: 600; cursor: pointer;
                                transition: background 0.2s;" />

        <p:commandButton rendered="#{proposalBean.entry.id != null}"
                         id="updateBtn"
                         value="Update Proposal"
                         actionListener="#{proposalBean.updateProposal}"
                         process="proposalView"
                         update="proposalView,global_msg"
                         style="background-color: #C9A84C; color: #0A1628; border: none;
                                padding: 0.65rem 1.6rem; border-radius: 4px;
                                font-size: 0.9rem; font-weight: 600; cursor: pointer;
                                transition: background 0.2s;" />

        <p:commandButton id="saveBtn"
                         value="Save as Draft"
                         actionListener="#{proposalBean.createProposal}"
                         process="proposalView"
                         update="proposalView,global_msg"
                         style="background-color: transparent; color: #1B3A6B;
                                border: 1.5px solid #1B3A6B; padding: 0.65rem 1.6rem;
                                border-radius: 4px; font-size: 0.9rem; cursor: pointer;
                                transition: all 0.2s;" />
    </div>

</ui:composition>
