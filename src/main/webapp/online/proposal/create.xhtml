<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:c="http://java.sun.com/jsp/jstl/core"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:o="http://omnifaces.org/ui"
	xmlns:of="http://omnifaces.org/functions">
<h:body>

	<ui:composition template="/ie_template2.xhtml">
		<ui:define name="body_title">
			<strong>Create</strong> New Proposal
    </ui:define>

		<ui:define name="body_">
			<h:form prependId="false" rendered="true">
				<p:ajaxStatus onstart="PF('status').show()"
					oncomplete="PF('status').hide()" />
				<p:dialog widgetVar="status" modal="true" closable="false">
					<p:graphicImage library="img" name="load4.jpg" />
				</p:dialog>
				<div class="box box-primary">
					<div class="box-header with-border">
						<h:panelGrid columns="3" cellpadding="5" id="grid" border="0">
							<f:facet name="header" id="notification_header">
								<p:messages id="global_message" globalOnly="true" />
							</f:facet>

							
							<p:outputLabel
								for="studentId" value="studentId:" /> <p:inputText id="studentId"
								value="#{proposalBean.entry.studentId}" required="true"
								requiredMessage="studentId must be supplied" size="70">
							</p:inputText> <p:message id="m_studentId" for="studentId" />
							
							<p:outputLabel
								for="supervisorId" value="supervisorId:" /> <p:inputText id="supervisorId"
								value="#{proposalBean.entry.supervisorId}" required="true"
								requiredMessage="supervisorId must be supplied" size="70">
							</p:inputText> <p:message id="m_supervisorId" for="supervisorId" />
							
							<p:outputLabel
								for="title" value="title:" /> <p:inputText id="title"
								value="#{proposalBean.entry.title}" required="true"
								requiredMessage="title must be supplied" size="70">
							</p:inputText> <p:message id="m_title" for="title" />
							
							<p:outputLabel
								for="problemStatement" value="problemStatement:" /> <p:inputText id="problemStatement"
								value="#{proposalBean.entry.problemStatement}" required="true"
								requiredMessage="problemStatement must be supplied" size="70">
							</p:inputText> <p:message id="m_problemStatement" for="problemStatement" />
							
							<p:outputLabel
								for="objectives" value="objectives:" /> <p:inputText id="objectives"
								value="#{proposalBean.entry.objectives}" required="true"
								requiredMessage="objectives must be supplied" size="70">
							</p:inputText> <p:message id="m_objectives" for="objectives" />
							
							<p:outputLabel
								for="methodology" value="methodology:" /> <p:inputText id="methodology"
								value="#{proposalBean.entry.methodology}" required="true"
								requiredMessage="methodology must be supplied" size="70">
							</p:inputText> <p:message id="m_methodology" for="methodology" />
							
							<p:outputLabel
								for="status" value="status:" /> <p:inputText id="status"
								value="#{proposalBean.entry.status}" required="true"
								requiredMessage="status must be supplied" size="70">
							</p:inputText> <p:message id="m_status" for="status" />
							
							<p:outputLabel
								for="supervisorComment" value="supervisorComment:" /> <p:inputText id="supervisorComment"
								value="#{proposalBean.entry.supervisorComment}" required="true"
								requiredMessage="supervisorComment must be supplied" size="70">
							</p:inputText> <p:message id="m_supervisorComment" for="supervisorComment" />
							
							<p:outputLabel
								for="similarityScore" value="similarityScore:" /> <p:inputText id="similarityScore"
								value="#{proposalBean.entry.similarityScore}" required="true"
								requiredMessage="similarityScore must be supplied" size="70">
							</p:inputText> <p:message id="m_similarityScore" for="similarityScore" />
							
							<p:outputLabel
								for="mostSimilarProposalId" value="mostSimilarProposalId:" /> <p:inputText id="mostSimilarProposalId"
								value="#{proposalBean.entry.mostSimilarProposalId}" required="true"
								requiredMessage="mostSimilarProposalId must be supplied" size="70">
							</p:inputText> <p:message id="m_mostSimilarProposalId" for="mostSimilarProposalId" />
							
							<p:outputLabel
								for="mostSimilarProjectId" value="mostSimilarProjectId:" /> <p:inputText id="mostSimilarProjectId"
								value="#{proposalBean.entry.mostSimilarProjectId}" required="true"
								requiredMessage="mostSimilarProjectId must be supplied" size="70">
							</p:inputText> <p:message id="m_mostSimilarProjectId" for="mostSimilarProjectId" />
							
							<p:outputLabel
								for="submittedAt" value="submittedAt:" /> <p:inputText id="submittedAt"
								value="#{proposalBean.entry.submittedAt}" required="true"
								requiredMessage="submittedAt must be supplied" size="70">
							</p:inputText> <p:message id="m_submittedAt" for="submittedAt" />

							<p:commandButton id="submitButton"
								action="#{proposalBean.createProposal}" ajax="false"
								value="Submit" update="grid" />
							<p:spacer />
							<p:spacer />
						</h:panelGrid>
					</div>
				</div>
			</h:form>
		</ui:define>
	</ui:composition>

</h:body>

</html>
