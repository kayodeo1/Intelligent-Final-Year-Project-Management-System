<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:c="http://java.sun.com/jsp/jstl/core"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:o="http://omnifaces.org/ui"
	xmlns:of="http://omnifaces.org/functions">

<h:head>
	<f:metadata>
		<f:viewAction action="#{proposalBean.listProposal()}" />
	</f:metadata>
</h:head>

<h:body>

	<ui:composition template="/ie_template2.xhtml">
		<ui:define name="body_title">
			<strong>Manage Proposal Entries</strong>
		</ui:define>

		<ui:define name="body_">
			<h:form prependId="false" rendered="true">
				<p:ajaxStatus onstart="PF('status').show()"
					oncomplete="PF('status').hide()" />
				<p:dialog widgetVar="status" modal="true" closable="false">
					<p:graphicImage library="img" name="load4.jpg" />
				</p:dialog>
				<p:messages id="global_msg" />
				<div class="box box-primary">
					<div class="box-header with-border">

						<p:outputPanel id="viewProposal"
							style="text-align:center;">

							<p:dataTable id="proposalList"
								var="entry" value="#{proposalBean.lazyModel}" paginator="true"
								rows="5" paginatorPosition="bottom"
								currentPageReportTemplate="Showing {startRecord}-{endRecord} out of {totalRecords}"
								paginatorTemplate="{RowsPerPageDropdown} {FirstPageLink} {PreviousPageLink} {CurrentPageReport} {NextPageLink} {LastPageLink}"
								rowsPerPageTemplate="5,10,15" selectionMode="single"
								selection="#{proposalBean.entry}" lazy="true"
								rowKey="#{entry.id}">
								<f:facet name="header">
									<hr />
									<p:spacer></p:spacer>
									<b></b>
									<strong>Proposal</strong> Entries Details </f:facet>


								 
								 <p:column headerText="studentId"
									style="text-align:center;">
									<h:outputText value="NA" rendered="#{entry.studentId==null} " />
									<h:outputText value="#{entry.studentId}"/>
								</p:column> 
								 <p:column headerText="supervisorId"
									style="text-align:center;">
									<h:outputText value="NA" rendered="#{entry.supervisorId==null} " />
									<h:outputText value="#{entry.supervisorId}"/>
								</p:column> 
								 <p:column headerText="title"
									style="text-align:center;">
									<h:outputText value="NA" rendered="#{entry.title==null} " />
									<h:outputText value="#{entry.title}"/>
								</p:column> 
								 <p:column headerText="problemStatement"
									style="text-align:center;">
									<h:outputText value="NA" rendered="#{entry.problemStatement==null} " />
									<h:outputText value="#{entry.problemStatement}"/>
								</p:column> 
								 <p:column headerText="objectives"
									style="text-align:center;">
									<h:outputText value="NA" rendered="#{entry.objectives==null} " />
									<h:outputText value="#{entry.objectives}"/>
								</p:column> 
								 <p:column headerText="methodology"
									style="text-align:center;">
									<h:outputText value="NA" rendered="#{entry.methodology==null} " />
									<h:outputText value="#{entry.methodology}"/>
								</p:column> 
								 <p:column headerText="status"
									style="text-align:center;">
									<h:outputText value="NA" rendered="#{entry.status==null} " />
									<h:outputText value="#{entry.status}"/>
								</p:column> 
								 <p:column headerText="supervisorComment"
									style="text-align:center;">
									<h:outputText value="NA" rendered="#{entry.supervisorComment==null} " />
									<h:outputText value="#{entry.supervisorComment}"/>
								</p:column> 
								 <p:column headerText="similarityScore"
									style="text-align:center;">
									<h:outputText value="NA" rendered="#{entry.similarityScore==null} " />
									<h:outputText value="#{entry.similarityScore}"/>
								</p:column> 
								 <p:column headerText="mostSimilarProposalId"
									style="text-align:center;">
									<h:outputText value="NA" rendered="#{entry.mostSimilarProposalId==null} " />
									<h:outputText value="#{entry.mostSimilarProposalId}"/>
								</p:column> 
								 <p:column headerText="mostSimilarProjectId"
									style="text-align:center;">
									<h:outputText value="NA" rendered="#{entry.mostSimilarProjectId==null} " />
									<h:outputText value="#{entry.mostSimilarProjectId}"/>
								</p:column> 
								 <p:column headerText="submittedAt"
									style="text-align:center;">
									<h:outputText value="NA" rendered="#{entry.submittedAt==null} " />
									<h:outputText value="#{entry.submittedAt}"/>
								</p:column>
								<p:column headerText="">
									<p:menuButton value="Action">
										<p:menuitem value="Edit" icon="ui-icon-arrowrefresh-1-w"
											style="font-size:1em!important;" process="@this"
											actionListener="#{proposalBean.displayProposalDialog(entry)}"
									update="proposalView,global_msg"
											immediate="true"
											oncomplete="PF('proposalDialog').show()">
											<p:resetInput target="proposalView" />
										</p:menuitem>
								</p:menuButton>
								</p:column>
							</p:dataTable>
							<p:commandButton id="submitButton" immediate="true"
								rendered="true" action="#{proposalBean.createNewProposalView}"
								oncomplete="PF('proposalDialog').show()"
								update="proposalView,global_msg"
								value="Create New Proposal">
								<p:resetInput target="proposalView" />
							</p:commandButton>

						</p:outputPanel>
					</div>
				</div>


				<p:dialog header="Proposal"
					widgetVar="proposalDialog"
					id="proposalDialog" modal="true"
					showEffect="fade" hideEffect="fade" resizable="true">

					<p:outputPanel id="proposalView"
						style="text-align:center;">
						<p:messages id="view_equip" severity="info,error"
							globalOnly="true" />
						<p:panelGrid columns="3" id="grid3" rendered="#{not empty proposalBean.entry}">
							<f:facet name="header">
								<p:graphicImage name="img/user_groups_admin.png" /> #{proposalBean.entry.id}
							</f:facet>

							   <p:outputLabel for="studentId" 
							  value="studentId:" /> <p:inputText id="studentId" value="#{proposalBean.entry.studentId}" required="true"
								requiredMessage="studentId must be supplied"
								validatorMessage="Invalid value supplied!" size="70">
								<f:validateLongRange></f:validateLongRange>
							</p:inputText> <p:message id="m_studentId" for="studentId" />    <p:outputLabel for="supervisorId" 
							  value="supervisorId:" /> <p:inputText id="supervisorId" value="#{proposalBean.entry.supervisorId}" required="true"
								requiredMessage="supervisorId must be supplied"
								validatorMessage="Invalid value supplied!" size="70">
								<f:validateLongRange></f:validateLongRange>
							</p:inputText> <p:message id="m_supervisorId" for="supervisorId" />    <p:outputLabel
								for="title" value="title:" /> <p:inputText id="title" value="#{proposalBean.entry.title}" required="true"
								requiredMessage="title must be supplied" size="70">
							</p:inputText> <p:message id="m_title" for="title" />   <p:outputLabel
								for="problemStatement" value="problemStatement:" /> <p:inputText id="problemStatement" value="#{proposalBean.entry.problemStatement}" required="true"
								requiredMessage="problemStatement must be supplied" size="70">
							</p:inputText> <p:message id="m_problemStatement" for="problemStatement" />   <p:outputLabel
								for="objectives" value="objectives:" /> <p:inputText id="objectives" value="#{proposalBean.entry.objectives}" required="true"
								requiredMessage="objectives must be supplied" size="70">
							</p:inputText> <p:message id="m_objectives" for="objectives" />   <p:outputLabel
								for="methodology" value="methodology:" /> <p:inputText id="methodology" value="#{proposalBean.entry.methodology}" required="true"
								requiredMessage="methodology must be supplied" size="70">
							</p:inputText> <p:message id="m_methodology" for="methodology" />   <p:outputLabel
								for="status" value="status:" /> <p:inputText id="status" value="#{proposalBean.entry.status}" required="true"
								requiredMessage="status must be supplied" size="70">
							</p:inputText> <p:message id="m_status" for="status" />   <p:outputLabel
								for="supervisorComment" value="supervisorComment:" /> <p:inputText id="supervisorComment" value="#{proposalBean.entry.supervisorComment}" required="true"
								requiredMessage="supervisorComment must be supplied" size="70">
							</p:inputText> <p:message id="m_supervisorComment" for="supervisorComment" />   <p:outputLabel
								for="similarityScore" value="similarityScore:" /> <p:inputText id="similarityScore" value="#{proposalBean.entry.similarityScore}" required="true"
								requiredMessage="similarityScore must be supplied" size="70">
							</p:inputText> <p:message id="m_similarityScore" for="similarityScore" />   <p:outputLabel for="mostSimilarProposalId" 
							  value="mostSimilarProposalId:" /> <p:inputText id="mostSimilarProposalId" value="#{proposalBean.entry.mostSimilarProposalId}" required="true"
								requiredMessage="mostSimilarProposalId must be supplied"
								validatorMessage="Invalid value supplied!" size="70">
								<f:validateLongRange></f:validateLongRange>
							</p:inputText> <p:message id="m_mostSimilarProposalId" for="mostSimilarProposalId" />    <p:outputLabel for="mostSimilarProjectId" 
							  value="mostSimilarProjectId:" /> <p:inputText id="mostSimilarProjectId" value="#{proposalBean.entry.mostSimilarProjectId}" required="true"
								requiredMessage="mostSimilarProjectId must be supplied"
								validatorMessage="Invalid value supplied!" size="70">
								<f:validateLongRange></f:validateLongRange>
							</p:inputText> <p:message id="m_mostSimilarProjectId" for="mostSimilarProjectId" />    <p:outputLabel
								for="submittedAt" value="submittedAt:" /> <p:inputText id="submittedAt" value="#{proposalBean.entry.submittedAt}" required="true"
								requiredMessage="submittedAt must be supplied" size="70">
							</p:inputText> <p:message id="m_submittedAt" for="submittedAt" />

							<p:commandButton rendered="#{proposalBean.entry.id==null}"
								id="submitButton2" ajax="true"
								process="proposalView"
								actionListener="#{proposalBean.createProposal}"
								value="Create Proposal"
								update="proposalView,global_msg" />

							<p:commandButton rendered="#{proposalBean.entry.id!=null}"
								id="submitButton3" ajax="true"
								process="proposalView"
								actionListener="#{proposalBean.updateProposal}"
								value="Update Proposal"
								update="proposalView,global_msg" />
							<p:spacer />
							<p:spacer />

						</p:panelGrid>
					</p:outputPanel>

				</p:dialog>

			</h:form>
		</ui:define>
	</ui:composition>
</h:body>

</html>
