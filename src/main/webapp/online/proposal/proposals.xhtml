<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:head>
	<f:metadata>
		<f:viewAction action="#{proposalBean.listStudentsProposal()}" />
	</f:metadata>
</h:head>

<h:body>
	<ui:composition template="/online/template/dashboard.xhtml">

		<ui:define name="student_name">
			<!-- Welcome Banner -->
		</ui:define>

		<ui:define name="dashboard_body">

			<style>
:root {
	--ink: #0C1B33;
	--ink-mid: #1B3A6B;
	--ink-soft: #2E5399;
	--gold: #C9A84C;
	--cream: #FAFAF7;
	--surface: #F2F4F9;
	--card: #FFFFFF;
	--border: #E0E6F0;
	--border-lt: #EEF1F8;
	--muted: #8A94A6;
	--text: #1A202C;
	--text-sm: #4A5568;
	--red: #C0392B;
	--red-bg: #FDF0EF;
	--green: #2E7D52;
	--green-bg: #EBF7F0;
	--amber: #B45309;
	--amber-bg: #FEF3C7;
	--r-sm: 6px;
	--r: 10px;
	--r-lg: 14px;
	--shadow-xs: 0 1px 3px rgba(12, 27, 51, .06);
	--shadow-sm: 0 2px 8px rgba(12, 27, 51, .08);
	--shadow-lg: 0 16px 56px rgba(12, 27, 51, .20);
}

.pg {
	font-family: 'Inter', 'Segoe UI', sans-serif;
	color: var(--text);
}

.pg-head {
	display: flex;
	align-items: flex-start;
	justify-content: space-between;
	margin-bottom: 1.75rem;
	flex-wrap: wrap;
	gap: 1rem;
}

.pg-head-copy h2 {
	font-family: 'Georgia', 'Times New Roman', serif;
	font-size: 1.55rem;
	font-weight: 700;
	color: var(--ink);
	margin: 0 0 0.2rem;
	letter-spacing: -0.3px;
	line-height: 1.2;
}

.pg-head-copy p {
	font-size: 0.82rem;
	color: var(--muted);
	margin: 0;
}

.btn-gold, .ui-button.btn-gold {
	background: linear-gradient(135deg, #C9A84C 0%, #E8C96A 100%) !important;
	color: var(--ink) !important;
	border: none !important;
	border-radius: var(--r-sm) !important;
	padding: 0.65rem 1.4rem !important;
	font-size: 0.83rem !important;
	font-weight: 600 !important;
	box-shadow: 0 2px 12px rgba(201, 168, 76, .30) !important;
	transition: all 0.2s ease !important;
	cursor: pointer !important;
	white-space: nowrap !important;
}

.btn-gold:hover, .ui-button.btn-gold:hover {
	box-shadow: 0 6px 24px rgba(201, 168, 76, .42) !important;
	transform: translateY(-1px) !important;
}

.ui-button.btn-gold .ui-button-text {
	padding: 0 !important;
}

.tbl-card {
	background: var(--card);
	border: 1px solid var(--border);
	border-radius: var(--r);
	box-shadow: var(--shadow-xs);
	overflow: hidden;
}

.tbl-card .ui-datatable {
	border: none !important;
	font-family: 'Inter', sans-serif !important;
}

.tbl-card .ui-datatable .ui-datatable-header {
	background: var(--card) !important;
	border: none !important;
	border-bottom: 1px solid var(--border) !important;
	padding: 1.15rem 1.5rem !important;
	text-align: left !important;
	font-family: 'Georgia', serif !important;
	font-size: 0.97rem !important;
	font-weight: 700 !important;
	color: var(--ink) !important;
}

.tbl-card .ui-datatable thead th {
	background: var(--surface) !important;
	border: none !important;
	border-bottom: 1px solid var(--border) !important;
	padding: 0.7rem 1.3rem !important;
	font-size: 0.69rem !important;
	font-weight: 600 !important;
	color: var(--muted) !important;
	text-transform: uppercase !important;
	letter-spacing: 0.5px !important;
}

.tbl-card .ui-datatable tbody td {
	border: none !important;
	border-bottom: 1px solid var(--border-lt) !important;
	padding: 0.95rem 1.3rem !important;
	font-size: 0.855rem !important;
	color: var(--text-sm) !important;
	vertical-align: middle !important;
}

.tbl-card .ui-datatable tbody tr:last-child td {
	border-bottom: none !important;
}

.tbl-card .ui-datatable tbody tr:hover td {
	background: #F8FAFF !important;
}

.tbl-card .ui-datatable .ui-datatable-empty-message td {
	padding: 3.5rem 1.3rem !important;
	text-align: center !important;
	color: var(--muted) !important;
	font-size: 0.88rem !important;
}

.cell-title {
	font-weight: 600 !important;
	color: var(--ink) !important;
	font-size: 0.875rem !important;
}

.cell-date {
	font-size: 0.8rem !important;
	color: var(--muted) !important;
}

.cell-comment {
	font-size: 0.82rem !important;
	color: var(--text-sm) !important;
	max-width: 220px;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}

.badge {
	display: inline-block;
	padding: 0.22rem 0.65rem;
	border-radius: 20px;
	font-size: 0.70rem;
	font-weight: 600;
	letter-spacing: 0.2px;
}

.badge-SUBMITTED {
	background: #DDEAF8;
	color: #1B3A6B;
}

.badge-APPROVED {
	background: var(--green-bg);
	color: var(--green);
}

.badge-REJECTED {
	background: var(--red-bg);
	color: var(--red);
}

.badge-PENDING {
	background: var(--amber-bg);
	color: var(--amber);
}

.badge-DRAFT {
	background: var(--surface);
	color: var(--muted);
	border: 1px solid var(--border);
}

.tbl-card .ui-paginator {
	background: var(--surface) !important;
	border: none !important;
	border-top: 1px solid var(--border) !important;
	padding: 0.7rem 1.3rem !important;
	font-size: 0.78rem !important;
}

.tbl-card .ui-paginator .ui-paginator-page, .tbl-card .ui-paginator .ui-paginator-first,
	.tbl-card .ui-paginator .ui-paginator-prev, .tbl-card .ui-paginator .ui-paginator-next,
	.tbl-card .ui-paginator .ui-paginator-last {
	border: 1px solid var(--border) !important;
	border-radius: 5px !important;
	background: var(--card) !important;
	color: var(--text-sm) !important;
	min-width: 30px !important;
	height: 30px !important;
	margin: 0 0.12rem !important;
}

.tbl-card .ui-paginator .ui-state-active {
	background: var(--ink-mid) !important;
	border-color: var(--ink-mid) !important;
	color: #fff !important;
}

.tbl-card .ui-paginator .ui-paginator-current {
	color: var(--muted) !important;
	font-size: 0.76rem !important;
}

.btn-view, .ui-button.btn-view {
	background: var(--card) !important;
	border: 1px solid var(--border) !important;
	border-radius: var(--r-sm) !important;
	color: var(--ink-mid) !important;
	font-size: 0.78rem !important;
	font-weight: 600 !important;
	padding: 0.32rem 0.85rem !important;
	transition: all 0.15s !important;
	cursor: pointer !important;
}

.btn-view:hover, .ui-button.btn-view:hover {
	background: var(--surface) !important;
	border-color: var(--ink-mid) !important;
}

.ui-button.btn-view .ui-button-text {
	padding: 0 0.25rem !important;
}

/* dialog */
.prop-dlg.ui-dialog {
	border: none !important;
	border-radius: var(--r-lg) !important;
	box-shadow: var(--shadow-lg) !important;
	width: min(700px, 96vw) !important;
}

.prop-dlg .ui-dialog-titlebar {
	background: var(--ink) !important;
	border: none !important;
	border-radius: var(--r-lg) var(--r-lg) 0 0 !important;
	padding: 1.1rem 1.6rem !important;
}

.prop-dlg .ui-dialog-title {
	font-family: 'Georgia', serif !important;
	font-size: 1.05rem !important;
	font-weight: 700 !important;
	color: var(--gold) !important;
}

.prop-dlg .ui-dialog-titlebar-close {
	color: var(--muted) !important;
}

.prop-dlg .ui-dialog-titlebar-close:hover {
	color: #fff !important;
}

.prop-dlg .ui-dialog-content {
	padding: 0 !important;
	background: var(--cream) !important;
	max-height: 74vh !important;
	overflow-y: auto !important;
}

.dlg-body {
	padding: 1.5rem 1.8rem 0.5rem;
}

.dlg-meta {
	display: flex;
	align-items: center;
	gap: 0.7rem;
	margin-bottom: 1.4rem;
	padding-bottom: 1.1rem;
	border-bottom: 1px solid var(--border);
	flex-wrap: wrap;
}

.dlg-meta-date {
	font-size: 0.77rem;
	color: var(--muted);
}

.dlg-field {
	margin-bottom: 1.15rem;
}

.dlg-label {
	display: block;
	font-size: 0.68rem;
	font-weight: 600;
	color: var(--muted);
	text-transform: uppercase;
	letter-spacing: 0.55px;
	margin-bottom: 0.38rem;
}

.dlg-value {
	background: var(--card);
	border: 1px solid var(--border);
	border-radius: var(--r-sm);
	padding: 0.75rem 1rem;
	font-size: 0.875rem;
	color: var(--text);
	line-height: 1.65;
}

.dlg-value.multi {
	white-space: pre-wrap;
	min-height: 58px;
}

.dlg-sim {
	display: flex;
	align-items: center;
	gap: 1rem;
	border-radius: var(--r-sm);
	padding: 0.9rem 1.1rem;
	margin-bottom: 1.15rem;
}

.dlg-sim.high {
	background: var(--red-bg);
	border: 1px solid #F5C6CB;
}

.dlg-sim.med {
	background: var(--amber-bg);
	border: 1px solid #FDE68A;
}

.dlg-sim.low {
	background: var(--green-bg);
	border: 1px solid #A7F3C9;
}

.sim-bubble {
	width: 48px;
	height: 48px;
	border-radius: 50%;
	flex-shrink: 0;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 0.78rem;
	font-weight: 700;
}

.dlg-sim.high .sim-bubble {
	background: #FDECEA;
	color: var(--red);
	border: 2px solid var(--red);
}

.dlg-sim.med  .sim-bubble {
	background: #FEF3C7;
	color: var(--amber);
	border: 2px solid var(--amber);
}

.dlg-sim.low  .sim-bubble {
	background: var(--green-bg);
	color: var(--green);
	border: 2px solid var(--green);
}

.sim-text .sim-head {
	font-size: 0.8rem;
	font-weight: 600;
	color: var(--text);
}

.sim-text .sim-sub {
	font-size: 0.73rem;
	color: var(--muted);
	margin-top: 0.12rem;
}

.dlg-footer {
	display: flex;
	align-items: center;
	justify-content: flex-end;
	gap: 0.65rem;
	padding: 1rem 1.8rem;
	border-top: 1px solid var(--border);
	background: var(--card);
	border-radius: 0 0 var(--r-lg) var(--r-lg);
}

.btn-primary, .ui-button.btn-primary {
	background: var(--ink-mid) !important;
	color: #fff !important;
	border: none !important;
	border-radius: var(--r-sm) !important;
	padding: 0.58rem 1.25rem !important;
	font-size: 0.82rem !important;
	font-weight: 600 !important;
	transition: all 0.2s !important;
	cursor: pointer !important;
}

.btn-primary:hover, .ui-button.btn-primary:hover {
	background: var(--ink-soft) !important;
	transform: translateY(-1px) !important;
}

.btn-ghost, .ui-button.btn-ghost {
	background: var(--card) !important;
	color: var(--text-sm) !important;
	border: 1px solid var(--border) !important;
	border-radius: var(--r-sm) !important;
	padding: 0.58rem 1.25rem !important;
	font-size: 0.82rem !important;
	font-weight: 600 !important;
	transition: all 0.15s !important;
	cursor: pointer !important;
}

.btn-ghost:hover, .ui-button.btn-ghost:hover {
	background: var(--surface) !important;
	border-color: var(--ink-mid) !important;
}

.ui-button.btn-primary .ui-button-text, .ui-button.btn-ghost .ui-button-text
	{
	padding: 0 !important;
}

.msg-wrap {
	margin-bottom: 1rem;
}

.msg-wrap .ui-messages {
	border-radius: var(--r-sm) !important;
	font-size: 0.82rem !important;
}

@media ( max-width : 768px) {
	.pg-head {
		flex-direction: column;
		align-items: flex-start;
	}
	.tbl-card .ui-datatable thead {
		display: none !important;
	}
	.tbl-card .ui-datatable tbody, .tbl-card .ui-datatable tbody tr,
		.tbl-card .ui-datatable tbody td {
		display: block !important;
		width: 100% !important;
	}
	.tbl-card .ui-datatable tbody td {
		padding: 0.4rem 1.3rem !important;
		border-bottom: none !important;
	}
	.tbl-card .ui-datatable tbody td:first-child {
		padding-top: 1rem !important;
	}
	.tbl-card .ui-datatable tbody td:last-child {
		padding-bottom: 1rem !important;
		border-bottom: 1px solid var(--border-lt) !important;
	}
}
</style>

			

			<p:ajaxStatus onstart="PF('loadDlg').show()"
				oncomplete="PF('loadDlg').hide()" />
			<p:dialog widgetVar="loadDlg" modal="true" closable="false"
				showHeader="false"
				contentStyle="padding:1.25rem 1.5rem;text-align:center;background:#fff;">
				<p:graphicImage library="img" name="load4.jpg" />
			</p:dialog>

			<div class="pg">

				<!-- Header -->
				<div class="pg-head">
					<div class="pg-head-copy">
						<h2>My Proposals</h2>
						<p>Track and manage your final year project proposals</p>
					</div>
					<p:commandButton value="+ New Proposal"
						action="#{proposalBean.newProposalView()}" ajax="false"
						styleClass="btn-gold" />
				</div>

				<!-- Messages -->
				<div class="msg-wrap">
					<p:messages id="globalMsg" showDetail="true" />
				</div>

				<!-- Table -->
				<div class="tbl-card">
					<p:dataTable id="proposalList" var="entry"
						value="#{proposalBean.lazyModel}" paginator="true" rows="5"
						paginatorPosition="bottom"
						currentPageReportTemplate="Showing {startRecord}–{endRecord} of {totalRecords}"
						paginatorTemplate="{RowsPerPageDropdown} {FirstPageLink} {PreviousPageLink} {CurrentPageReport} {NextPageLink} {LastPageLink}"
						rowsPerPageTemplate="5,10,15" lazy="true" rowKey="#{entry.id}"
						emptyMessage="No proposals yet — click '+ New Proposal' to get started.">

						<f:facet name="header">Proposal Submissions</f:facet>

						<p:column headerText="Project Title">
							<span class="cell-title"> <h:outputText
									value="#{entry.title}" />
							</span>
						</p:column>

						<p:column headerText="Status" style="width:130px;">
							<h:outputText styleClass="badge badge-#{entry.status}"
								value="#{entry.status}" />
						</p:column>

						<p:column headerText="Supervisor Comment">
							<span class="cell-comment"> <h:outputText
									value="#{empty entry.supervisorComment ? '—' : entry.supervisorComment}" />
							</span>
						</p:column>

						<p:column headerText="Submitted" style="width:140px;">
							<span class="cell-date"> <h:outputText
									value="#{entry.getCreatedDate()}" />
							</span>
						</p:column>

						<!-- ═══════════════════════════════════════════════
                         KEY FIX: no update attribute at all.
                         Bean calls PrimeFaces.current().ajax().update()
                         from Java — no XHTML naming scope issues.
                         ═══════════════════════════════════════════════ -->
						<p:column headerText="" style="width:80px;text-align:center;">
							<p:commandButton value="View" update="@form"
								actionListener="#{proposalBean.displayProposalDialog(entry)}"
								oncomplete="PF('proposalDetailDlg').show()"
								styleClass="btn-view" />
						</p:column>

					</p:dataTable>
				</div>

			</div>


			<p:dialog widgetVar="proposalDetailDlg" id="proposalDetailDlg"
				modal="true" showEffect="fade" hideEffect="fade" resizable="false"
				draggable="true" closable="true" header="Proposal Details"
				styleClass="prop-dlg">

				<p:outputPanel id="proposalDetailPanel" layout="block">

					<div class="dlg-body">

						<div class="dlg-meta">
							<h:outputText
								styleClass="badge badge-#{proposalBean.entry.status}"
								value="#{proposalBean.entry.status}" />
							<span class="dlg-meta-date"> &#128197;&#160;<h:outputText
									value="#{proposalBean.entry.getCreatedDate()}" />
							</span>
						</div>

						<div class="dlg-field">
							<span class="dlg-label">Project Title</span>
							<div class="dlg-value">
								<h:outputText value="#{proposalBean.entry.title}" />
							</div>
						</div>

						<div class="dlg-field">
							<span class="dlg-label">Problem Statement</span>
							<div class="dlg-value multi">
								<h:outputText value="#{proposalBean.entry.problemStatement}" />
							</div>
						</div>

						<div class="dlg-field">
							<span class="dlg-label">Aim &amp; Objectives</span>
							<div class="dlg-value multi">
								<h:outputText value="#{proposalBean.entry.objectives}" />
							</div>
						</div>

						<div class="dlg-field">
							<span class="dlg-label">Methodology</span>
							<div class="dlg-value multi">
								<h:outputText value="#{proposalBean.entry.methodology}" />
							</div>
						</div>

						<h:panelGroup
							rendered="#{not empty proposalBean.entry.supervisorComment}">
							<div class="dlg-field">
								<span class="dlg-label">Supervisor Comment</span>
								<div class="dlg-value">
									<h:outputText value="#{proposalBean.entry.supervisorComment}" />
								</div>
							</div>
						</h:panelGroup>

						<h:panelGroup
							rendered="#{proposalBean.entry.similarityScore != null
                                              and proposalBean.entry.similarityScore > 0}">
							<div
								class="dlg-sim #{proposalBean.entry.similarityScore >= 0.80 ? 'high' :
                                              proposalBean.entry.similarityScore >= 0.60 ? 'med' : 'low'}">
								<div class="sim-bubble">
									<h:outputText value="#{proposalBean.entry.similarityScore}">
										<f:convertNumber maxFractionDigits="2" />
									</h:outputText>
								</div>
								<div class="sim-text">
									<div class="sim-head">
										<h:outputText
											value="High similarity — closely matches an existing project"
											rendered="#{proposalBean.entry.similarityScore >= 0.80}" />
										<h:outputText
											value="Moderate similarity with an existing project"
											rendered="#{proposalBean.entry.similarityScore >= 0.60
                                                              and proposalBean.entry.similarityScore lt 0.80}" />
										<h:outputText value="Proposal appears mostly original"
											rendered="#{proposalBean.entry.similarityScore lt 0.60}" />
										
									</div>
									<div class="sim-sub">Click Compare to view the matching
										project.</div>
								</div>
							</div>
						</h:panelGroup>

					</div>

					<div class="dlg-footer">
						<p:commandButton value="Close" type="button"
							onclick="PF('proposalDetailDlg').hide();" styleClass="btn-ghost" />
						<p:commandButton value="&#128270; Compare Similar" ajax="false"
							action="#{proposalBean.compareSimilar}"
							rendered="#{proposalBean.entry.similarityScore != null
                                                 and proposalBean.entry.similarityScore > 0}"
							styleClass="btn-primary" />
						<p:commandButton value="&#128270; Submit to Supervisor" ajax="false"
							action="#{proposalBean.submitToSupervisor}"
							rendered="#{proposalBean.entry.status == 'DRAFT'}"
							styleClass="btn-primary" />
					</div>

				</p:outputPanel>
			</p:dialog>

		</ui:define>

	</ui:composition>
</h:body>
</html>
